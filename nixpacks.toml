[phases.setup]
nixPkgs = ["...", "php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.tokenizer", "php84Extensions.ctype"]

[phases.build]
cmds = [
    "mkdir -p storage/framework/{sessions,views,cache}",
    "composer install --no-dev --optimize-autoloader",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
