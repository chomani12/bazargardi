[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.tokenizer", "php84Extensions.ctype"]
aptPkgs = ["libonig-dev"]

[phases.build]
cmds = [
    "mkdir -p /app/storage/framework/{sessions,views,cache/data}",
    "mkdir -p /app/storage/logs",
    "mkdir -p /app/bootstrap/cache",
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "chmod -R 775 /app/storage /app/bootstrap/cache",
    "php artisan config:clear",
    "php artisan view:cache"
]

[start]
cmd = "chmod -R 775 /app/storage /app/bootstrap/cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
